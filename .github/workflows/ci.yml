name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel cmake ninja git \
            extra-cmake-modules \
            qt6-base qt6-multimedia qt6-5compat qt6-tools \
            kcoreaddons kconfig kio kparts kcrash knotifications \
            kxmlgui kbookmarks kiconthemes kconfigwidgets kwindowsystem \
            kpty kdbusaddons kglobalaccel knewstuff knotifyconfig \
            ktextwidgets kwidgetsaddons kservice ki18n \
            icu tmux

      - name: Configure
        run: cmake -B build -G Ninja -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure
        env:
          QT_QPA_PLATFORM: offscreen

  clang-format:
    name: clang-format
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel cmake ninja git \
            extra-cmake-modules \
            qt6-base qt6-multimedia qt6-5compat qt6-tools \
            kcoreaddons kconfig kio kparts kcrash knotifications \
            kxmlgui kbookmarks kiconthemes kconfigwidgets kwindowsystem \
            kpty kdbusaddons kglobalaccel knewstuff knotifyconfig \
            ktextwidgets kwidgetsaddons kservice ki18n \
            icu clang

      - name: Configure (generates .clang-format via KDEClangFormat)
        run: cmake -B build -G Ninja

      - name: Run clang-format
        run: find src -name '*.cpp' -o -name '*.h' | xargs clang-format --dry-run --Werror
