name: CI

on:
  push:
    branches: [master]
  pull_request:

# Run on the host ubuntu-latest runner and invoke docker ourselves so we can
# pass -t / --privileged. GitHub Actions' `container:` key swallows those
# flags (actions/runner#241, open since 2019), which breaks tests that need
# a working PTY subsystem inside the container (script(1), openpty(), tmux
# multi-client). Self-invoking docker sidesteps the bug.

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build & test in Arch container
        run: |
          docker run --rm -t --privileged \
            -v "$PWD":/src -w /src \
            archlinux:latest \
            bash -euc '
              pacman -Syu --noconfirm --needed \
                base-devel cmake ninja git \
                extra-cmake-modules \
                qt6-base qt6-multimedia qt6-5compat qt6-tools \
                kcoreaddons kconfig kio kparts kcrash knotifications \
                kxmlgui kbookmarks kiconthemes kconfigwidgets kwindowsystem \
                kpty kdbusaddons kglobalaccel knewstuff knotifyconfig \
                ktextwidgets kwidgetsaddons kservice ki18n \
                icu tmux util-linux \
                ttf-dejavu \
                xorg-server-xvfb xorg-xdpyinfo xorg-twm xdotool dbus

              cmake -B build -G Ninja -DBUILD_TESTING=ON
              cmake --build build
              QT_QPA_PLATFORM=offscreen ctest --test-dir build --output-on-failure
              USE_XVFB=1 ./scripts/autotests/run-all.sh
            '
