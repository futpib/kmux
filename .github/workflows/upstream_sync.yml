name: Sync upstream.

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: sync
        uses: AndreasAugustin/actions-template-sync@8a0f668b83c32a0f673353086d74f12b8853d4f5 # v2.5.3
        with:
          source_repo_path: KDE/konsole
          upstream_branch: master
          pr_title: 'Sync upstream KDE/konsole master'
          pr_labels: upstream-sync

      - if: success() && steps.sync.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run ci.yml --ref "${{ steps.sync.outputs.pr_branch }}"
          gh pr merge --auto --merge "${{ steps.sync.outputs.pr_number }}"

      - if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create \
            --title "Upstream sync from KDE/konsole failed" \
            --label upstream-sync \
            --body "The scheduled upstream sync failed. See [run]($RUN_URL)."
